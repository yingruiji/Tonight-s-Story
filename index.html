<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>共鸣剧场 Demo - 凌晨2:17的小票</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #0d1018;
      --panel: rgba(18, 22, 33, 0.88);
      --panel-2: rgba(255, 255, 255, 0.07);
      --text: #f6efe4;
      --muted: #b4a996;
      --accent: #ffd08a;
      --accent-2: #7fc7ff;
      --danger: #ff9e9e;
      --line: rgba(255, 255, 255, 0.13);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC",
        "Microsoft YaHei", sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      margin: 0;
      color: var(--text);
      background:
        radial-gradient(circle at 20% 10%, rgba(127, 199, 255, 0.2), transparent 26rem),
        radial-gradient(circle at 80% 28%, rgba(255, 208, 138, 0.18), transparent 22rem),
        linear-gradient(135deg, #070912 0%, #141a26 48%, #0f111a 100%);
    }

    body::before {
      position: fixed;
      inset: 0;
      pointer-events: none;
      content: "";
      background:
        repeating-linear-gradient(105deg, transparent 0 34px, rgba(255, 255, 255, 0.055) 35px, transparent 37px),
        radial-gradient(circle at 50% 16%, rgba(255, 208, 138, 0.12), transparent 18rem);
      opacity: 0.24;
      animation: rainDrift 9s linear infinite;
    }

    body::after {
      position: fixed;
      inset: auto 0 0;
      height: 32vh;
      pointer-events: none;
      content: "";
      background:
        linear-gradient(180deg, transparent, rgba(127, 199, 255, 0.08)),
        repeating-linear-gradient(90deg, transparent 0 42px, rgba(255, 208, 138, 0.04) 43px, transparent 45px);
      opacity: 0.45;
    }

    button {
      font: inherit;
      color: inherit;
      cursor: pointer;
      border: 0;
    }

    .shell {
      width: min(440px, 100%);
      min-height: 100vh;
      margin: 0 auto;
      padding: 18px 14px 28px;
    }

    .phone {
      position: relative;
      min-height: calc(100vh - 36px);
      overflow: hidden;
      border: 1px solid var(--line);
      border-radius: 28px;
      background: rgba(10, 13, 20, 0.82);
      box-shadow: 0 24px 80px rgba(0, 0, 0, 0.45);
      backdrop-filter: blur(14px);
    }

    .phone::before {
      position: absolute;
      inset: -20% -30% auto;
      height: 360px;
      content: "";
      background: radial-gradient(circle, rgba(255, 208, 138, 0.24), transparent 62%);
      filter: blur(12px);
    }

    .phone::after {
      position: absolute;
      inset: 0;
      pointer-events: none;
      content: "";
      background:
        linear-gradient(115deg, transparent 0 42%, rgba(255, 255, 255, 0.055) 43%, transparent 47%),
        radial-gradient(circle at 50% 12%, rgba(255, 208, 138, 0.12), transparent 12rem);
      mix-blend-mode: screen;
      opacity: 0.65;
    }

    .screen {
      position: relative;
      z-index: 1;
      min-height: calc(100vh - 38px);
      padding: 22px;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 20px;
    }

    .sound-toggle {
      position: absolute;
      top: 18px;
      right: 18px;
      z-index: 20;
      min-height: 34px;
      padding: 7px 10px;
      border: 1px solid rgba(255, 208, 138, 0.24);
      border-radius: 999px;
      background: rgba(14, 18, 29, 0.76);
      color: #ffe1ae;
      font-size: 12px;
      backdrop-filter: blur(10px);
    }

    .sound-toggle.on {
      border-color: rgba(127, 199, 255, 0.45);
      color: #cce9ff;
      box-shadow: 0 0 18px rgba(127, 199, 255, 0.15);
    }

    .eyebrow {
      margin: 0 0 7px;
      color: var(--accent);
      font-size: 12px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    h1, h2, h3, p {
      margin-top: 0;
    }

    h1 {
      margin-bottom: 10px;
      font-size: 34px;
      line-height: 1.06;
      letter-spacing: -0.04em;
    }

    h2 {
      margin-bottom: 8px;
      font-size: 25px;
      line-height: 1.16;
      letter-spacing: -0.03em;
    }

    h3 {
      margin-bottom: 8px;
      font-size: 16px;
    }

    p {
      color: var(--muted);
      line-height: 1.7;
    }

    .card {
      border: 1px solid var(--line);
      border-radius: 24px;
      padding: 18px;
      background: var(--panel);
    }

    .hero {
      min-height: 245px;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      margin: 22px 0;
      background:
        linear-gradient(180deg, rgba(10, 13, 20, 0.18), rgba(10, 13, 20, 0.9)),
        radial-gradient(circle at 70% 28%, rgba(255, 208, 138, 0.46), transparent 12rem),
        linear-gradient(145deg, #182536, #11131d);
    }

    .tags {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin: 14px 0 0;
    }

    .tag {
      display: inline-flex;
      align-items: center;
      min-height: 28px;
      padding: 5px 10px;
      border: 1px solid rgba(255, 208, 138, 0.23);
      border-radius: 999px;
      color: #ffe1ae;
      background: rgba(255, 208, 138, 0.08);
      font-size: 12px;
    }

    .meta {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      margin: 16px 0;
    }

    .meta-item {
      padding: 12px;
      border-radius: 18px;
      color: var(--muted);
      background: var(--panel-2);
      font-size: 12px;
    }

    .meta-item strong {
      display: block;
      margin-bottom: 4px;
      color: var(--text);
      font-size: 15px;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      min-height: 52px;
      padding: 13px 16px;
      border-radius: 18px;
      background: linear-gradient(135deg, #ffd08a, #ffb45c);
      color: #241a10;
      font-weight: 700;
      box-shadow: 0 12px 28px rgba(255, 180, 92, 0.18);
    }

    .btn.secondary {
      background: rgba(255, 255, 255, 0.08);
      color: var(--text);
      box-shadow: none;
    }

    .btn.small {
      width: auto;
      min-height: 38px;
      padding: 8px 12px;
      border-radius: 999px;
      font-size: 13px;
      font-weight: 600;
    }

    .progress {
      height: 8px;
      overflow: hidden;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.1);
    }

    .progress span {
      display: block;
      height: 100%;
      border-radius: inherit;
      background: linear-gradient(90deg, var(--accent), var(--accent-2));
      transition: width 220ms ease;
    }

    @keyframes rainDrift {
      from {
        transform: translate3d(0, -30px, 0);
      }
      to {
        transform: translate3d(-18px, 36px, 0);
      }
    }

    .scene-copy {
      min-height: 210px;
      margin: 16px 0;
      padding: 22px;
      border-radius: 24px;
      background:
        radial-gradient(circle at 12% 0%, rgba(127, 199, 255, 0.14), transparent 34%),
        linear-gradient(180deg, rgba(255, 255, 255, 0.08), rgba(255, 255, 255, 0.03)),
        rgba(14, 18, 29, 0.84);
      border: 1px solid var(--line);
    }

    .scene-copy p {
      margin-bottom: 12px;
      color: #eadfcc;
    }

    .choice-list {
      display: grid;
      gap: 10px;
    }

    .choice-panel {
      margin-top: 14px;
      padding: 16px;
      border: 1px solid rgba(255, 208, 138, 0.24);
      border-radius: 22px;
      background:
        radial-gradient(circle at 10% 0%, rgba(255, 208, 138, 0.2), transparent 38%),
        rgba(255, 208, 138, 0.07);
    }

    .choice-panel h3 {
      margin-bottom: 6px;
      color: #ffe1aa;
      font-size: 15px;
    }

    .choice-panel p {
      margin-bottom: 12px;
      color: #d8c8ad;
      font-size: 13px;
      line-height: 1.55;
    }

    .choice {
      width: 100%;
      min-height: 58px;
      padding: 14px 15px;
      border: 1px solid rgba(255, 208, 138, 0.28);
      border-radius: 18px;
      text-align: left;
      background: rgba(255, 255, 255, 0.09);
      transition: transform 160ms ease, border-color 160ms ease, background 160ms ease;
    }

    .choice:hover {
      transform: translateY(-1px);
      border-color: rgba(255, 208, 138, 0.55);
      background: rgba(255, 208, 138, 0.1);
    }

    .feedback {
      margin-top: 14px;
      padding: 14px;
      border-left: 3px solid var(--accent);
      border-radius: 14px;
      background: rgba(255, 208, 138, 0.08);
      color: #f4dfbd;
      line-height: 1.65;
    }

    .track {
      margin-top: 18px;
    }

    .route-nodes {
      position: relative;
      display: flex;
      align-items: flex-start;
      gap: 8px;
      overflow-x: auto;
      margin-top: 12px;
      padding: 18px 4px 6px;
      scrollbar-width: none;
    }

    .route-nodes::-webkit-scrollbar {
      display: none;
    }

    .route-node {
      position: relative;
      z-index: 1;
      display: grid;
      min-width: 60px;
      justify-items: center;
      gap: 7px;
    }

    .route-node:not(:last-child)::after {
      position: absolute;
      top: 13px;
      left: 50%;
      z-index: 0;
      width: calc(100% + 8px);
      height: 2px;
      content: "";
      border-radius: 999px;
      background:
        linear-gradient(90deg, rgba(255, 208, 138, 0.2), rgba(127, 199, 255, 0.66), rgba(255, 208, 138, 0.2));
      background-size: 200% 100%;
      animation: routeGlow 4s linear infinite;
    }

    .route-dot {
      position: relative;
      z-index: 1;
      display: grid;
      width: 28px;
      height: 28px;
      place-items: center;
      border: 2px solid rgba(255, 208, 138, 0.72);
      border-radius: 50%;
      background:
        radial-gradient(circle at 35% 32%, rgba(255, 255, 255, 0.95), rgba(255, 208, 138, 0.7) 38%, rgba(18, 22, 33, 0.96) 70%);
      color: var(--accent);
      font-size: 11px;
      font-weight: 700;
      box-shadow: 0 0 18px rgba(255, 208, 138, 0.22);
    }

    .route-dot.current {
      border-color: rgba(127, 199, 255, 0.92);
      color: var(--accent-2);
      animation: routePulse 1.8s ease-in-out infinite;
      box-shadow: 0 0 0 4px rgba(127, 199, 255, 0.1), 0 0 24px rgba(127, 199, 255, 0.35);
    }

    .route-body {
      position: relative;
      z-index: 1;
      min-width: 52px;
      padding: 6px 8px;
      border: 0;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.075);
      text-align: center;
    }

    .route-body strong {
      display: block;
      color: var(--text);
      font-size: 11px;
      white-space: nowrap;
    }

    .route-body span {
      display: none;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.45;
    }

    .route-popover {
      position: relative;
      margin-top: 14px;
      padding: 14px 15px;
      border: 1px solid rgba(255, 208, 138, 0.2);
      border-radius: 18px;
      background:
        radial-gradient(circle at 14% 0%, rgba(255, 208, 138, 0.16), transparent 34%),
        rgba(255, 255, 255, 0.065);
      color: #d7ccb9;
      line-height: 1.65;
    }

    .route-popover::before {
      position: absolute;
      top: -8px;
      left: 34px;
      width: 14px;
      height: 14px;
      content: "";
      border-top: 1px solid rgba(255, 208, 138, 0.2);
      border-left: 1px solid rgba(255, 208, 138, 0.2);
      background: rgba(27, 30, 43, 0.98);
      transform: rotate(45deg);
    }

    .route-popover strong {
      display: block;
      margin-bottom: 6px;
      color: var(--text);
      font-size: 14px;
    }

    .route-popover span {
      display: block;
      color: #d7ccb9;
      text-align: left;
    }

    @keyframes routeGlow {
      from {
        background-position: 0% 0;
      }
      to {
        background-position: 200% 0;
      }
    }

    @keyframes routePulse {
      0%, 100% {
        transform: scale(1);
      }
      50% {
        transform: scale(1.08);
      }
    }

    .track-list, .log-list {
      display: grid;
      gap: 8px;
      margin: 0;
      padding: 0;
      list-style: none;
    }

    .track-list li, .log-list li {
      padding: 10px 12px;
      border-radius: 14px;
      background: rgba(255, 255, 255, 0.06);
      color: var(--muted);
      font-size: 13px;
      line-height: 1.45;
    }

    .report-score {
      display: grid;
      gap: 10px;
      margin: 16px 0;
    }

    .score-row {
      display: grid;
      grid-template-columns: 82px 1fr;
      align-items: center;
      gap: 10px;
      color: var(--muted);
      font-size: 13px;
    }

    .score-bar {
      height: 10px;
      overflow: hidden;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.09);
    }

    .score-bar span {
      display: block;
      height: 100%;
      border-radius: inherit;
      background: linear-gradient(90deg, var(--accent), var(--accent-2));
    }

    .axis-grid {
      display: grid;
      gap: 10px;
      margin-top: 14px;
    }

    .axis-card {
      padding: 12px;
      border: 1px solid var(--line);
      border-radius: 16px;
      background: rgba(255, 255, 255, 0.055);
    }

    .axis-card strong {
      display: block;
      margin-bottom: 5px;
      color: var(--accent);
      font-size: 13px;
    }

    .axis-title {
      display: flex;
      margin-bottom: 10px;
      font-size: 13px;
    }

    .axis-labels {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      color: var(--muted);
      font-size: 12px;
    }

    .axis-track {
      position: relative;
      height: 8px;
      margin: 10px 4px;
      border-radius: 999px;
      background: linear-gradient(90deg, rgba(255, 208, 138, 0.72), rgba(127, 199, 255, 0.72));
    }

    .axis-dot {
      position: absolute;
      top: 50%;
      width: 18px;
      height: 18px;
      border: 3px solid #10141f;
      border-radius: 50%;
      background: #fff2cf;
      box-shadow: 0 0 0 2px rgba(255, 255, 255, 0.18);
      transform: translate(-50%, -50%);
    }

    .ticket {
      margin-top: 12px;
      padding: 16px;
      border: 1px dashed rgba(255, 208, 138, 0.42);
      border-radius: 18px;
      background:
        linear-gradient(135deg, rgba(255, 208, 138, 0.12), rgba(127, 199, 255, 0.07)),
        rgba(255, 255, 255, 0.04);
      color: #ffe5bd;
      line-height: 1.7;
    }

    .topic-grid {
      display: grid;
      gap: 10px;
      margin-top: 14px;
    }

    .topic-card {
      padding: 14px;
      border: 1px solid rgba(127, 199, 255, 0.28);
      border-radius: 18px;
      background: rgba(127, 199, 255, 0.08);
      text-align: left;
      line-height: 1.55;
    }

    .chat {
      display: grid;
      gap: 16px;
      margin-top: 20px;
    }

    .bubble {
      max-width: 86%;
      padding: 13px 15px;
      border-radius: 18px 18px 4px 18px;
      justify-self: end;
      background: linear-gradient(135deg, #ffd08a, #ffb45c);
      color: #23180f;
      line-height: 1.55;
    }

    .bubble.bot {
      justify-self: start;
      border-radius: 18px 18px 18px 4px;
      background: rgba(255, 255, 255, 0.09);
      color: var(--text);
    }

    .row {
      display: flex;
      gap: 10px;
      margin-top: 14px;
    }

    .row .btn {
      flex: 1;
    }

    .empty {
      padding: 12px;
      border: 1px dashed var(--line);
      border-radius: 16px;
      color: var(--muted);
      text-align: center;
    }

    @media (max-width: 420px) {
      .shell {
        padding: 0;
      }

      .phone {
        min-height: 100vh;
        border: 0;
        border-radius: 0;
      }

      .screen {
        min-height: 100vh;
      }
    }
  </style>
</head>
<body>
  <main class="shell">
    <section class="phone">
      <div id="app" class="screen"></div>
    </section>
  </main>
  <audio id="backgroundMusic" src="./background-music.mp3" loop preload="auto"></audio>

  <script>
    const story = {
      id: "store_0217",
      title: "凌晨2:17的小票",
      place: "不打烊便利店",
      mode: "雨夜进店",
      duration: "5分钟",
      ambianceTags: ["轻喜剧", "中等互动", "轻松深聊"],
      tendencyTags: ["夜间活跃", "慢热", "愿意深聊一点点"],
      intro: "雨停在街灯下面，手机时间停在2:17。你抬头时，一间刚才还不存在的便利店亮起招牌，像在等一个还没睡的人。",
      scenes: [
        {
          name: "门铃响了三次",
          narration: [
            "雨里亮起的便利店，招牌像刚醒过来。",
            "收银台没有店员，只有小票机慢慢吐出一张没有价格的小票。",
            "小票上写着：输入了17次，删除了17次。请替一位陌生人，把没敢发出去的话带到天亮前。"
          ],
          route: "雨刚停，第一张小票还没被读完。",
          choices: [
            choice("s1a", "先看小票任务，先别乱猜", "你把小票凑近暖光，下面还有一行灰色小字：其实我今天不是想聊天，我只是有点不想一个人待着。", { action: 2, rule: 2 }, "你有过打了很多字，最后又删掉的时候吗？"),
            choice("s1b", "轻声叫店员，先确认有没有人在", "你的声音落进货架间，没有人回应，制冷机替你叹了口气，像替很多深夜的人叹过。", { relation: 2, safety: 1 }, "如果凌晨有个人听你说话，你第一句会说什么？"),
            choice("s1c", "回头确认门还开着，安全感先到位", "门还虚掩着，雨味钻进来，你终于敢多看一眼。", { safety: 3 }, "你是那种进陌生地方会先看出口的人吗？")
          ]
        },
        {
          name: "没有价格的小票",
          narration: [
            "小票背面还有半句话：别告诉TA我哭了，就说我只是去便利店买了点东西。",
            "你盯着那行字看了一会儿。它不像任务，更像一个人撑不住时，给自己找的台阶。",
            "货架尽头的保温柜还亮着，热牛奶、关东煮、饭团都在。你忽然觉得，今晚也许不用马上说对什么，先让自己暖一点也可以。"
          ],
          route: "小票没有价格，只有一段没送出去的话。",
          choices: [
            choice("s2a", "读完整张小票", "你把每个字都看完，发现纸角画着一只很小的猫，旁边写着：别担心，我只是今天有点累。", { rule: 2, direct: 1 }, "你最想把哪一句“我没事”翻译成真话？"),
            choice("s2b", "先去保温柜找热牛奶", "保温柜里只剩最后一瓶，瓶身温得刚好。你忽然理解，有些安慰不需要很会说话。", { action: 2, warmth: 1 }, "深夜便利店里，什么东西最像安慰？"),
            choice("s2c", "把小票放回机器旁", "你不确定这是不是给你的任务。你只是先陪它待在原位，像陪一条没发出去的消息多等一会儿。", { safety: 2, reserved: 1 }, "你会把想说的话先存起来，还是趁夜晚说出去？")
          ]
        },
        {
          name: "第二位访客",
          narration: [
            "门铃又响了三次。",
            "一个穿着湿外套的人站在门口，手里也攥着一张小票。",
            "他说自己不是来找人的，只是每次心里堵得慌的时候，都会走进一家24小时便利店，假装自己只是来买水。"
          ],
          route: "门口来了第二个拿着小票的人。",
          choices: [
            choice("s3a", "主动问他的小票写了什么", "他愣了一下，然后把小票摊开给你看：我不是不回消息，我只是怕一开口就显得太需要人。", { relation: 2, direct: 2 }, "你会害怕自己显得太需要别人吗？"),
            choice("s3b", "先观察他的表情", "他没有害怕，只是很努力地装作没事，像很多人凌晨两点的朋友圈。", { rule: 1, reserved: 2 }, "你更常把难过发出来，还是藏起来？"),
            choice("s3c", "把热牛奶递给他", "他接过牛奶，小声说：谢谢，我刚才只是想找个地方慢慢缓一缓。", { warmth: 3, relation: 1 }, "如果不知道怎么安慰人，你会先递点吃的吗？")
          ]
        },
        {
          name: "草稿箱货架",
          narration: [

            choice("s8c", "约定下次睡不着就回来", "门铃轻轻晃了一下，像答应你：下次夜里有点难，也可以先找一盏灯。", { warmth: 2, action: 1 }, "如果下次又睡不着，你还会来这家便利店吗？")

    };

    const labels = {
      action: "行动",
      rule: "规则",
      relation: "关系",
      safety: "安全感",
      warmth: "温度",
      direct: "直接",
      reserved: "含蓄"
    };

    const state = {
      view: "home",
      sceneIndex: 0,
      choices: [],
      route: [],
      topics: [],
      scores: {},
      events: [],
      historyId: null,
      expandedRouteIndex: null,
      soundOn: false
    };

    function choice(id, label, feedback, scores, topic) {
      return { id, label, feedback, scores, topic };
    }

    function log(event, data = {}) {
      state.events.push({
        event,
        time: new Date().toLocaleTimeString("zh-CN", { hour12: false }),
        ...data
      });
    }

    function addScores(scores) {
      Object.entries(scores).forEach(([key, value]) => {
        state.scores[key] = (state.scores[key] || 0) + value;
      });
    }

    function setView(view) {
      state.view = view;
      render();
    }

    function startStory() {
      state.view = "intro";
      log("theater_enter", { storyId: story.id });
      render();
    }

    function playStory() {
      state.view = "playing";
      state.sceneIndex = 0;
      state.choices = [];
      state.route = [];
      state.topics = [];
      state.scores = {};
      state.events = state.events.filter((item) => item.event === "theater_enter");
      log("story_start", { storyId: story.id });
      render();
    }

    function selectChoice(choiceItem) {
      const scene = story.scenes[state.sceneIndex];
      state.choices.push(choiceItem.id);
      state.route.push({
        index: state.sceneIndex + 1,
        sceneName: scene.name,
        choiceLabel: choiceItem.label
      });
      addScores(choiceItem.scores);
      log("scene_complete", {
        storyId: story.id,
        sceneIndex: state.sceneIndex + 1,
        choiceId: choiceItem.id
      });

      if (choiceItem.topic && state.topics.length < 5) {
        const topic = {
          id: `topic_${choiceItem.id}`,
          text: choiceItem.topic,
          from: scene.name
        };
        state.topics.push(topic);
        log("topic_card_get", { storyId: story.id, sceneIndex: state.sceneIndex + 1, cardId: topic.id });
      }

      renderFeedback(choiceItem);
    }

    function nextScene() {
      if (state.sceneIndex >= story.scenes.length - 1) {
        state.view = "report";
        saveHistoryRecord();
        log("report_show", {
          storyId: story.id,
          personalityTags: getReport().keywords.join("/"),
          emotionTags: "治愈/微怅然"
        });
      } else {
        state.sceneIndex += 1;
      }
      render();
    }

    function openTopic(topicId) {
      const topicPool = [...(state.reportTopics || []), ...state.topics];
      state.activeTopic = topicPool.find((topic) => topic.id === topicId) || topicPool[0];
      log("topic_card_open", { cardId: state.activeTopic.id });
      state.view = "chat";
      render();
    }

    function resetDemo() {
      state.view = "home";
      state.sceneIndex = 0;
      state.choices = [];
      state.route = [];
      state.topics = [];
      state.scores = {};
      state.events = [];
      state.activeTopic = null;
      state.historyId = null;
      state.expandedRouteIndex = null;
      render();
    }

    function updateSoundToggle() {
      const button = document.getElementById("soundToggle");
      if (!button) return;
      button.textContent = state.soundOn ? "声音开" : "声音关";
      button.classList.toggle("on", state.soundOn);
    }

    async function toggleSound() {
      if (state.soundOn) {
        stopAmbience();
        state.soundOn = false;
        updateSoundToggle();
        return;
      }
      const started = await startAmbience();
      state.soundOn = started;
      updateSoundToggle();
    }

    async function startAmbience() {
      stopAmbience();
      const music = document.getElementById("backgroundMusic");
      if (!music) return false;
      music.volume = 0.35;
      try {
        await music.play();
        return true;
      } catch (error) {
        return false;
      }
    }

    function stopAmbience() {
      const music = document.getElementById("backgroundMusic");
      if (!music) return;
      music.pause();
    }

    function toggleRouteNode(index) {
      state.expandedRouteIndex = state.expandedRouteIndex === index ? null : index;
      render();
    }

    function getHistoryRecords() {
      try {
        return JSON.parse(localStorage.getItem("resonance_theater_history") || "[]")
          .sort((a, b) => new Date(b.completedAt) - new Date(a.completedAt));
      } catch (error) {
        return [];
      }
    }

    function setHistoryRecords(records) {
      localStorage.setItem("resonance_theater_history", JSON.stringify(records.slice(0, 20)));
    }

    function saveHistoryRecord() {
      const report = getReport();
      const record = {
        id: `record_${Date.now()}`,
        storyTitle: story.title,
        place: story.place,
        completedAt: new Date().toISOString(),
        personaName: report.persona.name,
        personaLine: report.persona.line,
        selfTicket: report.persona.selfTicket,
        matchName: report.match.name,
        matchReason: report.match.reason,
        route: [...state.route],
        topics: [
          ...report.persona.openers.map((text, index) => ({ id: `history_opener_${index}`, text, from: report.persona.name })),
          ...state.topics
        ].slice(0, 6)
      };
      const records = getHistoryRecords();
      setHistoryRecords([record, ...records]);
      state.historyId = record.id;
    }

    function openHistory(id) {
      state.historyId = id;
      state.view = "historyDetail";
      render();
    }

    function formatRecordTime(value) {
      return new Date(value).toLocaleString("zh-CN", {
        month: "2-digit",
        day: "2-digit",
        hour: "2-digit",
        minute: "2-digit",
        hour12: false
      });
    }

    function formatRouteChoice(item) {
      if (typeof item === "object" && item) {
        return `${item.index}. ${item.sceneName}：你选择了「${item.choiceLabel}」`;
      }
      if (item.includes("你选择了")) return item;
      const parts = item.split("：");
      if (parts.length < 2) return item;
      const scene = parts.shift();
      const choiceText = parts.join("：");
      return `${scene}：你选择了「${choiceText}」`;
    }

    function renderRouteNodes(route, currentSceneIndex = null) {
      const nodes = route.map((item) => {
        if (typeof item === "object" && item) return item;
        const formatted = formatRouteChoice(item);
        const match = formatted.match(/^(\d+)\. ([^：]+)：你选择了「(.+)」$/);
        if (!match) return { index: "", sceneName: "已完成剧情", choiceLabel: formatted };
        return { index: match[1], sceneName: match[2], choiceLabel: match[3] };
      });
      if (currentSceneIndex !== null) {
        const scene = story.scenes[currentSceneIndex];
        nodes.push({
          index: currentSceneIndex + 1,
          sceneName: scene.name,
          choiceLabel: "当前剧情"
        });
      }
      const expandedNode = nodes.find((node) => Number(node.index) === state.expandedRouteIndex);
      const expandedScene = expandedNode ? story.scenes[Number(expandedNode.index) - 1] : null;
      const expandedSummary = expandedScene ? expandedScene.narration.slice(0, 3).join(" ") : "";
      return `
        <div class="route-nodes">
          ${nodes.map((node) => {
            const isCurrent = node.choiceLabel === "当前剧情";
            const nodeIndex = Number(node.index);
            return `
              <div class="route-node">
                <div class="route-dot ${isCurrent ? "current" : ""}">${isCurrent ? "◎" : node.index}</div>
                <button class="route-body" onclick="toggleRouteNode(${nodeIndex})">
                  <strong>${escapeHtml(isCurrent ? "当前" : `第${node.index}幕`)}</strong>
                  <span>${escapeHtml(isCurrent ? "当前剧情" : "已走过")}</span>
                </button>
              </div>
            `;
          }).join("")}
        </div>
        ${expandedNode && expandedSummary ? `
          <div class="route-popover">
            <strong>${escapeHtml(expandedNode.sceneName)}</strong>
            <span>${escapeHtml(expandedSummary)}</span>
          </div>
        ` : ""}
      `;
    }

    function getReport() {
      const sorted = Object.entries(state.scores).sort((a, b) => b[1] - a[1]);
      const top = sorted.slice(0, 3);
      const keywords = top.map(([key]) => {
        if (key === "safety") return "稳稳的安全感型";
        if (key === "relation") return "为陌生人停留的人";
        if (key === "rule") return "先找规则的探索者";
        if (key === "action") return "愿意先迈一步的人";
        if (key === "warmth") return "会用行动照顾人";
        if (key === "direct") return "把话说清楚的人";
        return "含蓄的观察者";
      });
      const personaResult = buildPersona(top);
      return {
        top,
        keywords: keywords.length ? keywords : ["慢热的夜间观察者"],
        summary: buildSummary(top),
        axes: buildAxes(),
        persona: personaResult,
        match: buildMatch(personaResult)
      };
    }

    function buildChoiceInsight(choiceItem) {
      const scores = choiceItem.scores || {};
      const sorted = Object.entries(scores).sort((a, b) => b[1] - a[1]);
      const phrases = {
        safety: "确认安全",
        relation: "先看见人",
        warmth: "用行动安慰",
        rule: "先理解规则",
        direct: "把话说清楚",
        reserved: "先把情绪收好",
        action: "先迈一步"
      };
      const details = {
        safety: "你会先确认边界，再靠近未知。",
        relation: "你会先感受对方，而不是只处理任务。",
        warmth: "你不急着解释，更愿意先给一点温度。",
        rule: "你会先看懂规则，再决定怎么投入。",
        direct: "你倾向让重要的话有一个明确落点。",
        reserved: "你会先让情绪安静下来，再决定要不要说。",
        action: "你愿意先推动故事，让答案在行动里出现。"
      };
      const top = sorted.filter(([, value]) => value > 0).slice(0, 2);
      if (!top.length) return "你用自己的节奏处理这个夜晚。";
      const names = top.map(([key]) => phrases[key] || labels[key] || key).join(" + ");
      const explanation = top.map(([key]) => details[key]).filter(Boolean).join("");
      return `${names}：${explanation}`;
    }

    function scoreOf(key) {
      return state.scores[key] || 0;
    }

    function buildAxes() {
      return [
        buildAxis("靠近方式", "先靠近人", scoreOf("relation"), "先确认规则", scoreOf("rule"), "你会先看对方是不是想有人陪一下。", "你会先弄清边界，再决定要不要靠近。"),
        buildAxis("表达方式", "把话说出", scoreOf("direct"), "先留在心里", scoreOf("reserved"), "你倾向把关键的话放到台面上。", "你更习惯先消化情绪，再决定要不要说。"),
        buildAxis("安全感来源", "确认出口", scoreOf("safety"), "先迈一步", scoreOf("action"), "未知里，你需要知道自己随时可以退回去。", "未知里，你会边走边找答案。"),
        buildAxis("修复方式", "把话送达", scoreOf("direct") + scoreOf("action"), "允许放下", scoreOf("warmth") + scoreOf("reserved"), "你相信有些话说出口后，心事才有落点。", "你相信不是每句话都要被追问到底。")
      ];
    }

    function buildAxis(name, leftLabel, leftScore, rightLabel, rightScore, leftDetail, rightDetail) {
      const total = leftScore + rightScore || 1;
      const position = Math.max(12, Math.min(88, 50 + ((rightScore - leftScore) / total) * 38));
      const leansLeft = leftScore >= rightScore;
      return {
        name,
        leftLabel,
        rightLabel,
        result: leansLeft ? leftLabel : rightLabel,
        detail: leansLeft ? leftDetail : rightDetail,
        position: Math.round(position)
      };
    }

    function buildPersona(top) {
      const keys = top.map(([key]) => key);
      const warmthRelation = scoreOf("warmth") + scoreOf("relation");
      const directAction = scoreOf("direct") + scoreOf("action");
      const reservedSafety = scoreOf("reserved") + scoreOf("safety");

      if (scoreOf("reserved") >= 4 && scoreOf("direct") <= 2) {
        return persona(
          "草稿箱囤货员",
          "我不是没话说，我只是先把话放进草稿箱冷静一下。",
          "你常常把消息打好又删掉，不是不想靠近，是怕发出去之后收不回来。",
          "你会反复想：现在说会不会太晚、太多、太打扰。可你也很希望有人能看懂你没发出的那部分。",
          "今晚不用急着按发送键。先承认自己想被听见，就已经不是一件小事。"
        );
      }

      if (scoreOf("safety") >= 5) {
        return persona(
          "进门先看出口的人",
          "我可以进去看看，但我得先知道门还开着。",
          "你不是胆小，也不是冷淡。只是到了陌生的地方，你会先确认自己有没有退路。",
          "关系里也是这样：你会先观察对方靠不靠谱，再一点点把话说出来。",
          "保护自己不丢人。你只是需要一个能让你慢慢放松的地方。"
        );
      }

      if (directAction >= warmthRelation && directAction >= reservedSafety) {
        return persona(
          "凌晨直球派",
          "有些话拖到明天会更难开口，所以我想趁现在说清楚。",
          "你不太受得了心事一直悬着。夜深的时候，你反而会想把那句话讲明白。",
          "你愿意先推进，也能承担说完之后的安静或回应。",
          "不必每次都当先开口的人。但你愿意把话说清楚，这很难得。"
        );
      }

      if (keys.includes("warmth") && keys.includes("relation")) {
        return persona(
          "热牛奶递过去的人",
          "我可能讲不出大道理，但我会先问你要不要喝点热的。",
          "在这次故事里，你很容易注意到别人哪里不对劲，也会用行动让对方舒服一点。",
          "你不一定最会说漂亮话，但你会记得递纸、买热牛奶、陪人多坐一会儿。",
          "别忘了，你也可以被照顾，不用一直当那个照顾大家的人。"
        );
      }

      if (keys.includes("rule") && keys.includes("safety")) {
        return persona(
          "边界感店员",
          "我会把灯开着，但不会追问你为什么这么晚才来。",
          "你能看见别人的难处，也会提醒自己不要替对方做决定。",
          "你关心人很有分寸：可以递水、可以陪着，但不会把关心变成压力。",
          "这种不逼人的温柔很珍贵，半夜尤其需要。"
        );
      }

      return persona(
        "留灯值班员",
        "我不一定主动喊你，但你来了，我会把灯留着。",
        "你是慢热的，不会立刻把心事摊开，却愿意陪一件事等到天亮。",
        "你常常安静地待在旁边，不抢话，也不轻易走开。有人难过时，你会用在场感陪TA撑过去。",
        "不用急着变得外向。能在旁边多坐一会儿，已经很难得。"
      );
    }

    function persona(name, line, emotionMode, relationHabit, selfTicket) {
      return {
        name,
        line,
        emotionMode,
        relationHabit,
        selfTicket,
        openers: [
          "如果把今晚删掉的一句话打印出来，你希望它被谁看见？",
          "如果便利店能收留一句没发出去的话，你会放哪一句？",
          "你会把没发出去的话留在草稿箱，还是找个时间说出来？"
        ]
      };
    }

    function buildMatch(personaResult) {
      const matches = {
        "草稿箱囤货员": {
          name: "热牛奶递过去的人",
          reason: "你会先把话收起来，TA 不会催你立刻说完，只会先问你要不要喝点热的。"
        },
        "进门先看出口的人": {
          name: "留灯值班员",
          reason: "你需要边界和出口，TA 不会堵住门口问个不停。"
        },
        "凌晨直球派": {
          name: "边界感店员",
          reason: "你愿意把话说清楚，TA 能接住你的直接，也会提醒你不用把自己逼太紧。"
        },
        "热牛奶递过去的人": {
          name: "草稿箱囤货员",
          reason: "你擅长给出温度，TA 刚好需要一个不会催促的人。"
        },
        "边界感店员": {
          name: "凌晨直球派",
          reason: "你守住分寸，TA 帮沉默的部分找到一句可以说出口的话。"
        },
        "留灯值班员": {
          name: "进门先看出口的人",
          reason: "你不急着靠近，TA 也需要一个能慢慢确认安全感的人。"
        }
      };
      return matches[personaResult.name] || {
        name: "热牛奶递过去的人",
        reason: "你们都不急着把话说满，适合从一个很轻的问题开始聊。"
      };
    }

    function buildSummary(top) {
      const keys = top.map(([key]) => key);
      if (keys.includes("warmth") && keys.includes("relation")) {
        return "你没有急着破解便利店的规则，而是先照顾故事里的人。你的路线像一杯深夜的热牛奶：不一定高声表达，但让人知道自己没有被丢在凌晨两点。";
      }
      if (keys.includes("rule") && keys.includes("safety")) {
        return "你习惯先确认边界，再靠近未知。你不是冷淡，只是希望每一步都有依据。那些打了又删的话，你更适合一点点说，不用逼自己立刻发出去。";
      }
      if (keys.includes("action") && keys.includes("direct")) {
        return "你更愿意推进故事，而不是站在门口等答案。你知道有些话拖久了会变重，所以宁愿先把它说清楚，哪怕只是先对自己说。";
      }
      return "你在这间便利店里留下了一条安静但清晰的路线：先观察，再选择；先保护自己，再试着靠近别人。今晚不用急着变好，能把一句话留到天亮，也已经很不容易。";
    }

    function escapeHtml(value) {
      return String(value).replace(/[&<>"']/g, (char) => ({
        "&": "&amp;",
        "<": "&lt;",
        ">": "&gt;",
        "\"": "&quot;",
        "'": "&#039;"
      }[char]));
    }

    function tagHtml(tags) {
      return tags.map((tag) => `<span class="tag">${escapeHtml(tag)}</span>`).join("");
    }

    function render() {
      const app = document.getElementById("app");
      if (state.view === "home") app.innerHTML = renderHome();
      if (state.view === "intro") app.innerHTML = renderIntro();
      if (state.view === "playing") app.innerHTML = renderPlaying();
      if (state.view === "report") app.innerHTML = renderReport();
      if (state.view === "route") app.innerHTML = renderRouteDetail();
      if (state.view === "chat") app.innerHTML = renderChat();
      if (state.view === "history") app.innerHTML = renderHistory();
      if (state.view === "historyDetail") app.innerHTML = renderHistoryDetail();
      if (state.view === "logs") app.innerHTML = renderLogs();
      updateSoundToggle();
    }

    function renderHome() {
      return `
        <div class="topbar">
          <div>
            <p class="eyebrow">Soul · 共鸣剧场 Demo</p>
            <h1>今晚故事</h1>
          </div>
          <button id="soundToggle" class="sound-toggle" type="button" onclick="toggleSound()">声音关</button>
        </div>
        <section class="card hero">
          <p class="eyebrow">故事中</p>
          <h2>${story.title}</h2>
          <p>${story.place}</p>
          <div class="tags">${tagHtml([...story.tendencyTags, ...story.ambianceTags])}</div>
        </section>
        <div class="meta">
          <div class="meta-item"><strong>1/8</strong>起始进度</div>
          <div class="meta-item"><strong>${story.duration}</strong>单局时长</div>
          <div class="meta-item"><strong>${story.mode}</strong>模式</div>
        </div>
        <button class="btn" onclick="startStory()">进入剧场</button>
        <button class="btn secondary" style="margin-top: 12px;" onclick="setView('history')">我的剧场记录</button>
      `;
    }

    function renderIntro() {
      return `
        <div class="topbar">
          <button class="btn small secondary" onclick="setView('home')">返回</button>
        </div>
        <section class="card">
          <p class="eyebrow">不打烊便利店</p>
          <h1>${story.title}</h1>
          <p>${story.intro}</p>
          <div class="tags">${tagHtml([...story.tendencyTags, ...story.ambianceTags])}</div>
        </section>
        <section class="card" style="margin-top: 14px;">
          <h3>前期提要</h3>
          <p>这家便利店只在一些睡不着的夜里出现。它不卖东西，只收留那些打了又删、没来得及发出去的话。今晚，小票机把其中一句交到了你手里。</p>
        </section>
        <section class="card" style="margin-top: 14px;">
          <h3>体验目标</h3>
          <p>从这里开始，连续完成 8 个场景。每次选择都会记录到本次路线，并影响最终共鸣报告。结果只基于本次故事选择生成，不代表真实心理状态。</p>
        </section>
        <button class="btn" style="margin-top: 16px;" onclick="playStory()">开始</button>
      `;
    }

    function renderPlaying() {
      const scene = story.scenes[state.sceneIndex];
      const percent = ((state.sceneIndex + 1) / story.scenes.length) * 100;
      return `
        <div class="topbar">
          <button class="btn small secondary" onclick="setView('home')">退出</button>
          <span class="tag">Scene ${state.sceneIndex + 1}/8</span>
        </div>
        <div class="progress"><span style="width: ${percent}%"></span></div>
        <section class="scene-copy">
          <p class="eyebrow">${story.mode}</p>
          <h2>${scene.name}</h2>
          ${scene.narration.map((line) => `<p>${escapeHtml(line)}</p>`).join("")}
        </section>
        <div class="choice-panel">
          <h3>你接下来怎么做？</h3>
          <div id="choiceArea" class="choice-list" autocomplete="off" data-recommendations="off">
            ${scene.choices.map((item) => `
              <button class="choice" type="button" autocomplete="off" onclick="selectChoiceById('${item.id}')">${escapeHtml(item.label)}</button>
            `).join("")}
          </div>
        </div>
        ${state.route.length ? renderTrack() : ""}
      `;
    }

    function renderFeedback(choiceItem) {
      const choiceArea = document.getElementById("choiceArea");
      choiceArea.innerHTML = `
        <div class="feedback">${escapeHtml(choiceItem.feedback)}</div>
        <button class="btn" onclick="nextScene()">${state.sceneIndex === story.scenes.length - 1 ? "查看共鸣报告" : "进入下一幕"}</button>
      `;
    }

    function selectChoiceById(id) {
      const scene = story.scenes[state.sceneIndex];
      const found = scene.choices.find((item) => item.id === id);
      if (found) selectChoice(found);
    }

    function renderTrack() {
      return `
        <section class="track card">
          <h3>你走过的夜路</h3>
          <p>小灯会记住你经过的每一幕，点一下可以回看片段。</p>
          ${renderRouteNodes(state.route, state.sceneIndex)}
        </section>
      `;
    }

    function renderReport() {
      const report = getReport();
      const max = Math.max(...Object.values(state.scores), 1);
      const topics = state.topics.length ? state.topics : [
        { id: "fallback_topic", text: "你会替陌生人把一句话带到天亮前吗？", from: "通关默认" }
      ];
      const reportTopics = [
        ...report.persona.openers.map((text, index) => ({ id: `persona_opener_${index}`, text, from: report.persona.name })),
        ...topics
      ];
      state.reportTopics = reportTopics;
      if (!state.topics.length) state.topics = topics;
      return `
        <div class="topbar">
          <button class="btn small secondary" onclick="setView('home')">首页</button>
          <span class="tag">报告展示</span>
        </div>
        <section class="card">
          <p class="eyebrow">你的共鸣类型</p>
          <h1>${escapeHtml(report.persona.name)}</h1>
          <p>${escapeHtml(report.persona.line)}</p>
          <div class="tags">${tagHtml(report.keywords)}</div>
          <p style="margin-top: 14px;">${escapeHtml(report.summary)}</p>
          <button class="btn secondary" style="margin-top: 12px;" onclick="setView('route')">查看本次路线</button>
        </section>
        <section class="card" style="margin-top: 14px;">
          <h3>四组共鸣维度</h3>
          <div class="axis-grid">
            ${report.axes.map((axis) => `
              <div class="axis-card">
                <div class="axis-title">
                  <strong>${escapeHtml(axis.name)}</strong>
                </div>
                <div class="axis-labels">
                  <span>${escapeHtml(axis.leftLabel)}</span>
                  <span>${escapeHtml(axis.rightLabel)}</span>
                </div>
                <div class="axis-track">
                  <span class="axis-dot" style="left: ${axis.position}%"></span>
                </div>
                <p>${escapeHtml(axis.detail)}</p>
              </div>
            `).join("")}
          </div>
        </section>
        <section class="card" style="margin-top: 14px;">
          <h3>夜晚情绪模式</h3>
          <p>${escapeHtml(report.persona.emotionMode)}</p>
          <h3>你在关系里的习惯</h3>
          <p>${escapeHtml(report.persona.relationHabit)}</p>
          <div class="ticket">
            <strong>今晚给自己的小票</strong><br />
            ${escapeHtml(report.persona.selfTicket)}
          </div>
        </section>
        <section class="card" style="margin-top: 14px;">
          <h3>适合你的共鸣对象</h3>
          <div class="axis-card">
            <strong>${escapeHtml(report.match.name)}</strong>
            ${escapeHtml(report.match.reason)}
          </div>
        </section>
        <section class="card" style="margin-top: 14px;">
          <h3>选择维度</h3>
          <div class="report-score">
            ${Object.entries(state.scores).map(([key, value]) => `
              <div class="score-row">
                <span>${labels[key] || key}</span>
                <div class="score-bar"><span style="width: ${(value / max) * 100}%"></span></div>
              </div>
            `).join("")}
          </div>
        </section>
        <section class="card" style="margin-top: 14px;">
          <h3>聊天预览</h3>
          <p>挑一句开场白，发给「${escapeHtml(report.match.name)}」试试。</p>
          <div class="topic-grid">
            ${reportTopics.slice(0, 3).map((topic) => `
              <button class="topic-card" onclick="openTopic('${topic.id}')">
                ${escapeHtml(topic.text)}
              </button>
            `).join("")}
          </div>
        </section>
        <button class="btn" style="margin-top: 14px;" onclick="resetDemo()">重新体验</button>
      `;
    }

    function renderRouteDetail() {
      return `
        <div class="topbar">
          <button class="btn small secondary" onclick="setView('report')">返回报告</button>
          <span class="tag">本次路线</span>
        </div>
        <section class="card">
          <h2>这次你怎么选的</h2>
          <p>这里可以回看自己走过的路线。</p>
          ${state.route.length
            ? renderRouteNodes(state.route)
            : `<div class="empty">还没有路线记录。</div>`}
        </section>
      `;
    }

    function renderHistory() {
      const records = getHistoryRecords();
      return `
        <div class="topbar">
          <button class="btn small secondary" onclick="setView('home')">返回</button>
          <span class="tag">我的剧场记录</span>
        </div>
        <section class="card">
          <h2>我的剧场记录</h2>
          <p>这里保存你完成过的故事报告。</p>
          ${records.length
            ? `<div class="topic-grid">${records.map((record) => `
                <button class="topic-card" onclick="openHistory('${record.id}')">
                  <strong>${escapeHtml(formatRecordTime(record.completedAt))} · ${escapeHtml(record.storyTitle)}</strong><br />
                  共鸣类型：${escapeHtml(record.personaName)}<br />
                  ${escapeHtml(record.selfTicket)}
                </button>
              `).join("")}</div>`
            : `<div class="empty">还没有记录。完成一次故事后，这里会自动保存。</div>`}
        </section>
      `;
    }

    function renderHistoryDetail() {
      const record = getHistoryRecords().find((item) => item.id === state.historyId);
      if (!record) {
        return `
          <div class="topbar">
            <button class="btn small secondary" onclick="setView('history')">返回</button>
          </div>
          <section class="card"><div class="empty">没有找到这条记录。</div></section>
        `;
      }
      return `
        <div class="topbar">
          <button class="btn small secondary" onclick="setView('history')">返回</button>
          <span class="tag">${escapeHtml(formatRecordTime(record.completedAt))}</span>
        </div>
        <section class="card">
          <p class="eyebrow">${escapeHtml(record.place)}</p>
          <h1>${escapeHtml(record.personaName)}</h1>
          <p>${escapeHtml(record.personaLine)}</p>
          <div class="ticket">
            <strong>那晚给自己的小票</strong><br />
            ${escapeHtml(record.selfTicket)}
          </div>
        </section>
        <section class="card" style="margin-top: 14px;">
          <h3>当时的路线</h3>
          ${renderRouteNodes(record.route || [])}
        </section>
        <section class="card" style="margin-top: 14px;">
          <h3>当时适合你的共鸣对象</h3>
          <div class="axis-card">
            <strong>${escapeHtml(record.matchName)}</strong>
            ${escapeHtml(record.matchReason)}
          </div>
        </section>
      `;
    }

    function renderChat() {
      const topic = state.activeTopic || state.topics[0];
      const report = getReport();
      return `
        <div class="topbar">
          <button class="btn small secondary" onclick="setView('report')">返回报告</button>
          <span class="tag">聊天预览</span>
        </div>
        <section class="card">
          <p class="eyebrow">模拟聊天</p>
          <h2>还没有发送给真实用户</h2>
          <p>本 Demo 只验证话题卡进入聊天的情况，后续可接通私信。</p>
        </section>
        <div class="chat">
          <div class="bubble bot">对方类型：${escapeHtml(report.match.name)}<br />${escapeHtml(report.match.reason)}</div>
          <div class="bubble">${escapeHtml(topic.text)}</div>
          <div class="bubble bot">这句开场白已经进入预览。真实链路不在本期 Demo 范围内。</div>
        </div>
      `;
    }

    function renderLogs() {
      return `
        <div class="topbar">
          <button class="btn small secondary" onclick="setView('${state.sceneIndex > 0 ? "playing" : "home"}')">返回</button>
          <span class="tag">埋点日志</span>
          <button class="btn small secondary" onclick="resetDemo()">重置</button>
        </div>
        <section class="card">
          <h2>事件流</h2>
          <p>用于验证：开始、节点完成、报告展示、话题打开等关键事件是否被记录。</p>
          ${state.events.length
            ? `<ul class="log-list">${state.events.map((item) => `
                <li><strong>${escapeHtml(item.event)}</strong> · ${escapeHtml(item.time)}<br />${escapeHtml(JSON.stringify(item))}</li>
              `).join("")}</ul>`
            : `<div class="empty">还没有埋点事件。</div>`}
        </section>
      `;
    }

    render();
  </script>
</body>
</html>
